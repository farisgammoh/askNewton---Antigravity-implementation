name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Pre-existing lint debt (~25 issues, unrelated to this workflow) means
      # lint isn't a hard gate yet. Flip continue-on-error off once that's
      # cleaned up — see README "Known gaps".
      - name: Lint (non-blocking — see comment above)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
